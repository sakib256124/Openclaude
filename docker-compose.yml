services:
  postgres:
    image: postgres:16-alpine
    container_name: opencloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencloud
      POSTGRES_USER: opencloud
      POSTGRES_PASSWORD: opencloud_dev_password
    ports:
      - "5432:5432"
    volumes:
      - opencloud-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencloud -d opencloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencloud-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://opencloud:opencloud_dev_password@postgres:5432/opencloud?schema=public
      APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: opencloud-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  opencloud-postgres-data:
